# Pocket Pali App Initialization Test
# Validates successful application startup and home view rendering
# Tested on: iOS Simulator

appId: host.exp.Exponent

---
# Verify the app is running and learn screen is visible
- launchApp
- runFlow:
    when:
      visible: "Pocket Pali"
    commands:
      - tapOn: "Pocket Pali"
- assertVisible:
    id: "learn-screen"

