<svg width="256" height="256" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Mask: white = visible, black = hidden -->
    <mask id="moon-mask">
      <rect width="24" height="24" fill="white" />
      <!-- Cut out cloud 1 area (upper right) with padding -->
      <ellipse cx="18.5" cy="7" rx="3.8" ry="2.6" fill="black" />
      <!-- Cut out cloud 2 area (lower) with padding -->
      <ellipse cx="14" cy="20" rx="5" ry="3" fill="black" />
    </mask>
  </defs>
  <!-- Crescent moon — masked behind clouds -->
  <path
    d="M19 13C18 16 15.5 18.5 12 18.5C7.9 18.5 4.5 15.1 4.5 11C4.5 7.5 7 5 10 4C8.8 6 8.5 9 10.5 11.5C12.5 14 15.5 14.5 19 13Z"
    stroke="currentColor"
    stroke-width="1.8"
    stroke-linecap="round"
    stroke-linejoin="round"
    mask="url(#moon-mask)"
  />
  <!-- Cloud 1 — small, upper right (scaled 120% around center ~18.5,6.75) -->
  <path
    d="M16 7.5C16 6.7 16.7 6 17.5 6C17.6 5.4 18.1 5 18.8 5C19.5 5 20 5.5 20 6.1C20.6 6.2 21 6.7 21 7.3C21 7.9 20.5 8.5 19.8 8.5H16.8C16.3 8.5 16 8.1 16 7.5Z"
    fill="currentColor"
    stroke="currentColor"
    stroke-width="1.3"
    stroke-linecap="round"
    stroke-linejoin="round"
    transform="translate(18.5,6.75) scale(1.2) translate(-18.5,-6.75)"
  />
  <!-- Cloud 2 — larger, lower (scaled 120% around center ~13.5,19.25) -->
  <path
    d="M10 20.5C10 19.5 10.9 18.5 12 18.5C12.1 17.7 12.9 17 13.8 17C14.8 17 15.5 17.7 15.5 18.5C16.3 18.6 17 19.2 17 20C17 20.8 16.3 21.5 15.4 21.5H11C10.4 21.5 10 21.1 10 20.5Z"
    fill="currentColor"
    stroke="currentColor"
    stroke-width="1.3"
    stroke-linecap="round"
    stroke-linejoin="round"
    transform="translate(13.5,19.25) scale(1.2) translate(-13.5,-19.25)"
  />
</svg>
